# 상세 성능 테스트 1/3: 빌드 + NFS 쓰기 baseline + 샘플 생성 (119 x 50MB CSV)
# 노드를 단계별로 분리해 page cache 오염 없이 cold read를 측정한다.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tar2parquet-perf-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tar2parquet-perf-gen
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      nodeName: talos-wk-03
      containers:
        - name: gen
          image: golang:1.24
          workingDir: /work
          command: ["/bin/bash", "-ec"]
          args:
            - |
              echo "== node info =="
              nproc; grep -m1 'model name' /proc/cpuinfo
              df -hT /data | tail -1

              echo "== clone & build =="
              git clone --depth 1 https://github.com/nineking424/tar2parquet.git src
              cd src && git log --oneline -1
              mkdir -p /data/bin
              time go build -o /data/bin/tar2parquet .
              go build -o /data/bin/gen ./bench/gen
              go build -o /data/bin/check ./bench/check
              go build -o /data/bin/gunzip ./bench/gunzip

              echo "== NFS write baseline (1GiB, fsync) =="
              dd if=/dev/zero of=/data/dd.test bs=4M count=256 conv=fsync 2>&1 | tail -1
              rm /data/dd.test

              echo "== gen 119 x 50MB onto NFS =="
              time /data/bin/gen /data/A.tar.gz
              ls -l /data/A.tar.gz
              echo "== gen done =="
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tar2parquet-perf-data
